name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  syntax-check:
    name: JavaScript syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: Verify air-quality-card.js parses
        run: node --check air-quality-card.js
      - name: Verify helpers.js parses
        run: node --check helpers.js

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: Run unit tests
        run: npm test
