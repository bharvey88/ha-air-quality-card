name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run typecheck

  build:
    name: Bundle build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - name: Verify committed bundle matches build output
        run: |
          # The committed air-quality-card.js must match what `npm run build`
          # produces from src/. Fails CI if a PR forgot to rebuild.
          if [ -n "$(git status --porcelain air-quality-card.js)" ]; then
            echo "::error::air-quality-card.js is out of sync with src/. Run 'npm run build' and commit."
            git diff air-quality-card.js
            exit 1
          fi

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: npm test
