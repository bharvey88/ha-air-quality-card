name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload air-quality-card.js
        uses: softprops/action-gh-release@v3
        with:
          files: air-quality-card.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
