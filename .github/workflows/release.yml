name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to upload assets to'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload card assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            air-quality-card.js
            helpers.js
          tag_name: ${{ github.event.inputs.tag || github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
